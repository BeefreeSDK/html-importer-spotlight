<!DOCTYPE html>
<html lang="en">

<head>
  <title>Beefree SDK - Integration Example</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      overflow: hidden;
      background-color: #f5f5f5;
      color: #333;
    }

    #bee-plugin-container {
      position: absolute;
      top: 50px;
      bottom: 30px;
      left: 5px;
      right: 5px;
    }

    #integrator-bottom-bar {
      position: absolute;
      height: 25px;
      bottom: 0;
      left: 5px;
      right: 0;
    }

    #import-html-btn {
      position: absolute;
      top: 5px;
      left: 5px;
      background-color: #6a0dad;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }

    #import-html-btn:hover {
      background-color: #7b1fa2;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.4);
    }

    .modal-content {
      background-color: #fefefe;
      margin: 15% auto;
      padding: 20px;
      border-radius: 8px;
      width: 50%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 20px;
      gap: 10px;
    }

    .modal-actions button {
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
    }

    .modal-actions .cancel-btn {
      background-color: #f5f5f5;
      border: 1px solid #ddd;
    }

    .modal-actions .upload-btn {
      background-color: #6a0dad;
      color: white;
      border: none;
    }

    .modal-actions .upload-btn:hover {
      background-color: #7b1fa2;
    }

    #html-input {
      width: 100%;
      height: 200px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: monospace;
      resize: vertical;
    }

    .error-message {
      color: #d32f2f;
      background-color: #ffebee;
      border-left: 4px solid #f44336;
      padding: 10px;
      margin-top: 10px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
    }

    .loading {
      display: none;
      margin-top: 10px;
      color: #6a0dad;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <button id="import-html-btn">Import HTML</button>
  <div id="bee-plugin-container"></div>
  <div id="integrator-bottom-bar">
    Select template to load:
    <input id="choose-template" type="file" />
    Send test e-mail to:
    <input id="integrator-test-emails" type="text" />
  </div>

  <!-- HTML Import Modal -->
  <div id="html-import-modal" class="modal">
    <div class="modal-content">
      <h3>Import HTML Email</h3>
      <p style="margin-bottom: 10px; font-size: 12px; color: #666;">
        Paste your HTML email code below. Scripts and other potentially harmful content will be automatically removed.
      </p>
      <textarea id="html-input" placeholder="Paste your HTML email here..."></textarea>
      <div id="html-error" class="error-message">HTML not valid</div>
      <div id="loading" class="loading">Converting HTML, please wait...</div>
      <div class="modal-actions">
        <button class="cancel-btn">Cancel</button>
        <button class="upload-btn">Import</button>
      </div>
    </div>
  </div>

  <script src="./Blob.js"></script>
  <script src="./FileSaver.js"></script>
  <script src="https://app-rsrc.getbee.io/plugin/BeePlugin.js"></script>

  <script type="text/javascript">
    // Request function
    var request = function (method, url, data, type, callback) {
      var req = new XMLHttpRequest();
      req.onreadystatechange = function () {
        if (req.readyState === 4 && req.status === 200) {
          var response = JSON.parse(req.responseText);
          callback(response);
        } else if (req.readyState === 4 && req.status !== 200) {
          console.error('Access denied, invalid credentials. Please check you entered a valid client_id and client_secret.');
        }
      };

      req.open(method, url, true);
      if (data && type) {
        if (type === 'multipart/form-data') {
          var formData = new FormData();
          for (var key in data) {
            formData.append(key, data[key]);
          }
          data = formData;
        }
        else {
          req.setRequestHeader('Content-type', type);
        }
      }
      req.send(data);
    };

    var save = function (filename, content) {
      saveAs(
        new Blob([content], { type: 'text/plain;charset=utf-8' }),
        filename
      );
    };

    var specialLinks = [{
      type: 'unsubscribe',
      label: 'SpecialLink.Unsubscribe',
      link: 'http://[unsubscribe]/'
    }, {
      type: 'subscribe',
      label: 'SpecialLink.Subscribe',
      link: 'http://[subscribe]/'
    }];

    var mergeTags = [{
      name: 'tag 1',
      value: '[tag1]'
    }, {
      name: 'tag 2',
      value: '[tag2]'
    }];

    var mergeContents = [{
      name: 'content 1',
      value: '[content1]'
    }, {
      name: 'content 2',
      value: '[content1]'
    }];

    var beeConfig = {
      uid: 'test1-clientside',
      container: 'bee-plugin-container',
      language: 'en-US',
      trackChanges: true,
      specialLinks: specialLinks,
      mergeTags: mergeTags,
      mergeContents: mergeContents
    };

    var bee = null;

    var loadTemplate = function (e) {
      var templateFile = e.target.files[0];
      var reader = new FileReader();

      reader.onload = function () {
        var templateString = reader.result;
        var template = JSON.parse(templateString);
        bee.load(template);
      };

      reader.readAsText(templateFile);
    };

    var modal = document.getElementById('html-import-modal');
    var htmlInput = document.getElementById('html-input');
    var errorMessage = document.getElementById('html-error');
    var loading = document.getElementById('loading');
    var importBtn = document.getElementById('import-html-btn');
    var cancelBtn = document.querySelector('.cancel-btn');
    var uploadBtn = document.querySelector('.upload-btn');
    
    function sanitizeHtml(html) {
      html = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
      
      html = html.replace(/<iframe\b[^<]*(?:(?!<\/iframe>)<[^<]*)*<\/iframe>/gi, '');
      
      const eventHandlers = [
        'onabort', 'onblur', 'onchange', 'onclick', 'ondblclick', 'onerror', 'onfocus', 
        'onkeydown', 'onkeypress', 'onkeyup', 'onload', 'onmousedown', 'onmousemove', 
        'onmouseout', 'onmouseover', 'onmouseup', 'onreset', 'onresize', 'onscroll', 
        'onselect', 'onsubmit', 'onunload'
      ];
      
      eventHandlers.forEach(handler => {
        const regex = new RegExp(` ${handler}="[^"]*"| ${handler}='[^']*'| ${handler}=[^ >]*`, 'gi');
        html = html.replace(regex, '');
      });
      
      html = html.replace(/javascript:[^\s"']+/gi, '');
      
      html = html.replace(/data:[^\s"']+/gi, '');
      
      return html;
    }

    importBtn.addEventListener('click', function() {
      modal.style.display = 'block';
      htmlInput.value = '';
      errorMessage.style.display = 'none';
    });

    cancelBtn.addEventListener('click', function() {
      modal.style.display = 'none';
    });

    uploadBtn.addEventListener('click', function() {
      var html = htmlInput.value.trim();
      
      if (!html || !html.includes('<') || !html.includes('>')) {
        errorMessage.textContent = 'Please enter valid HTML content';
        errorMessage.style.display = 'block';
        return;
      }
      
      // Basic sanitization to prevent common XSS attack vectors
      // Remove script tags, iframe tags, and event handlers
      html = sanitizeHtml(html);
      
      loading.style.display = 'block';
      errorMessage.style.display = 'none';
      
      fetch('http://localhost:3001/proxy/html-to-json', {
        method: 'POST',
        headers: {
          'Content-Type': 'text/html'
        },
        body: html
      })
      .then(response => {
        if (!response.ok) throw new Error('Conversion failed');
        return response.json();
      })
      .then(data => {
        bee.load(data);
        modal.style.display = 'none';
      })
      .catch(error => {
        errorMessage.textContent = 'Error: ' + error.message;
        errorMessage.style.display = 'block';
      })
      .finally(() => {
        loading.style.display = 'none';
      });
    });

    window.addEventListener('click', function(event) {
      if (event.target === modal) {
        modal.style.display = 'none';
      }
    });

    document.getElementById('choose-template').addEventListener('change', loadTemplate, false);

    request(
      'POST',
      'https://auth.getbee.io/apiauth',
      'grant_type=password&client_id=4fe2a4d9-46ca-4630-910c-d061a595c9f7&client_secret=wrSqUNqZPIkeUbV7JCehbz50Q676WqC49HoC0isOql2k9hTYdtjM',
      'application/x-www-form-urlencoded',
      function (token) {
        BeePlugin.create(token, beeConfig, function (beePluginInstance) {
          bee = beePluginInstance;
          fetch('./template.json')
            .then((response) => response.json())
            .then((template) => {
              bee.start(template);
            })
            .catch((error) => {
              console.error('Error loading local template:', error);
              bee.start({});
            });
        });
      });
  </script>
</body>
</html>
